<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalWire · Chicago Roadshow 2026</title>
<link rel="icon" type="image/png" href="https://mcdn.signalwire.com/images/v2/loud/LogoLarge.png">
<style>
  :root {
    --sw-blue: #044cf6;
    --sw-blue-deep: #0a2882;
    --sw-dark: #0a1628;
    --sw-card: #111b30;
    --sw-card-2: #16223c;
    --sw-border: #1a2540;
    --sw-magenta: #F72A72;
    --sw-cyan: #38bdf8;
    --sw-orange: #ff9100;
    --sw-text: #cdd6e4;
    --sw-text-bright: #f0f4fa;
    --sw-text-dim: #6b7a94;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    background: var(--sw-dark);
    color: var(--sw-text);
    line-height: 1.55;
    min-height: 100vh;
  }
  a { color: var(--sw-blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px;
    font-family: 'SF Mono', monospace; font-size: 0.88em; color: var(--sw-text-bright);
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 32px; position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--sw-text-bright); font-size: 14px; }
  .brand-mark {
    width: 24px; height: 24px; border-radius: 6px;
    background: linear-gradient(135deg, var(--sw-blue) 0%, var(--sw-magenta) 100%);
    box-shadow: 0 4px 14px rgba(247,42,114,0.3);
  }
  .topbar nav a { color: rgba(240,244,250,0.7); text-decoration: none; font-size: 13px; margin-left: 22px; }
  .topbar nav a:hover { color: var(--sw-text-bright); text-decoration: none; }

  /* ============ HERO with WIZARD ============ */
  .hero {
    padding: 92px 24px 64px;
    background:
      radial-gradient(ellipse 60% 50% at 18% 22%, rgba(4,76,246,0.42) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 84% 18%, rgba(247,42,114,0.30) 0%, transparent 60%),
      radial-gradient(ellipse 70% 30% at 50% 100%, rgba(4,76,246,0.12) 0%, transparent 70%),
      var(--sw-dark);
    border-bottom: 1px solid var(--sw-border);
    position: relative;
  }
  .hero-inner { max-width: 880px; margin: 0 auto; }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sw-magenta); font-weight: 700; margin-bottom: 18px;
  }
  .hero-eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--sw-magenta); box-shadow: 0 0 8px var(--sw-magenta);
  }
  .hero h1 {
    font-size: 44px; line-height: 1.08; font-weight: 800;
    color: var(--sw-text-bright); letter-spacing: -0.025em;
    text-align: center; max-width: 760px; margin: 0 auto;
  }
  .hero h1 .accent {
    background: linear-gradient(90deg, var(--sw-blue), var(--sw-magenta));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-sub {
    margin: 16px auto 0; font-size: 17px; color: var(--sw-text);
    max-width: 560px; text-align: center;
  }

  /* ============ PROGRESS BAR (wizard milestones) ============ */
  .milestones {
    display: flex; align-items: center; gap: 0;
    max-width: 720px; margin: 44px auto 0;
  }
  .milestone {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative;
  }
  .milestone-dot {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(10,22,40,0.7); border: 2px solid var(--sw-border);
    display: flex; align-items: center; justify-content: center;
    color: var(--sw-text-dim); font-weight: 700; font-size: 13px;
    transition: all 0.2s;
  }
  .milestone.done .milestone-dot {
    background: rgba(56,189,248,0.15); border-color: var(--sw-cyan); color: var(--sw-cyan);
  }
  .milestone.active .milestone-dot {
    background: linear-gradient(135deg, var(--sw-blue), var(--sw-magenta));
    border-color: var(--sw-magenta); color: white; transform: scale(1.22);
    box-shadow: 0 0 0 5px rgba(247,42,114,0.18), 0 0 24px rgba(247,42,114,0.45);
  }
  .milestone-label {
    font-size: 11.5px; color: var(--sw-text-dim); font-weight: 500;
    white-space: nowrap; letter-spacing: 0.01em;
  }
  .milestone.done .milestone-label { color: var(--sw-text); }
  .milestone.active .milestone-label { color: var(--sw-text-bright); font-weight: 600; }
  .milestone-connector {
    flex: 1; height: 2px; background: var(--sw-border);
    margin: 0 -2px; align-self: flex-start; margin-top: 19px;
  }
  .milestone-connector.done { background: var(--sw-cyan); }

  /* ============ ACTIVE WIZARD CARD ============ */
  .wizard-card {
    margin: 36px auto 0;
    max-width: 720px;
    background: linear-gradient(180deg, rgba(4,76,246,0.06) 0%, var(--sw-card) 50%);
    border: 1px solid rgba(4,76,246,0.3);
    border-radius: 18px;
    padding: 36px 36px 32px;
    box-shadow: 0 24px 60px -20px rgba(4,76,246,0.4), 0 8px 30px -10px rgba(247,42,114,0.15);
    position: relative;
  }
  .wizard-eyebrow {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--sw-blue); font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .wizard-eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--sw-blue); box-shadow: 0 0 8px var(--sw-blue);
  }
  .wizard-card h2 {
    font-size: 30px; color: var(--sw-text-bright); font-weight: 700;
    letter-spacing: -0.015em; line-height: 1.15;
  }
  .wizard-card .lead {
    font-size: 15.5px; color: var(--sw-text); margin-top: 10px;
  }

  /* big URL card inside wizard */
  .url-card {
    margin-top: 24px;
    background: rgba(10,22,40,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid var(--sw-border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .url-meta { flex: 1; min-width: 0; }
  .url-label {
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sw-text-dim); font-weight: 600; margin-bottom: 6px;
  }
  .url-text {
    font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 14.5px;
    color: var(--sw-text-bright); overflow-x: auto; white-space: nowrap;
  }
  .url-text .scheme { color: var(--sw-text-dim); }
  .url-text .step { color: var(--sw-magenta); font-weight: 700; }
  .btn-copy {
    background: var(--sw-blue); border: none; color: white;
    padding: 11px 22px; border-radius: 8px; font-weight: 600;
    font-size: 13.5px; cursor: pointer; white-space: nowrap;
    box-shadow: 0 4px 12px rgba(4,76,246,0.35);
  }

  /* dashboard preview */
  .dashboard-hint {
    margin-top: 18px; display: flex; gap: 14px; align-items: stretch;
  }
  .hint-step {
    flex: 1; background: rgba(255,255,255,0.02);
    border: 1px solid var(--sw-border); border-radius: 10px;
    padding: 14px 16px;
  }
  .hint-num {
    display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
    background: var(--sw-blue); color: white; font-size: 11px; font-weight: 700;
    align-items: center; justify-content: center; margin-bottom: 8px;
  }
  .hint-step h4 { font-size: 13px; color: var(--sw-text-bright); margin-bottom: 4px; font-weight: 600; }
  .hint-step p { font-size: 12.5px; color: var(--sw-text-dim); line-height: 1.45; }
  .hint-step strong { color: var(--sw-text); }

  .wizard-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--sw-border);
  }
  .btn-secondary {
    background: transparent; border: 1px solid var(--sw-border); color: var(--sw-text);
    padding: 10px 18px; border-radius: 8px; font-size: 13.5px; cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--sw-blue); color: var(--sw-text-bright); }
  .btn-primary {
    background: var(--sw-blue); border: none; color: white;
    padding: 10px 22px; border-radius: 8px; font-weight: 600;
    font-size: 13.5px; cursor: pointer;
  }
  .step-counter { font-size: 12px; color: var(--sw-text-dim); }

  .skip-link {
    text-align: center; margin-top: 24px; font-size: 12.5px; color: var(--sw-text-dim);
  }
  .skip-link a { color: var(--sw-text-dim); text-decoration: underline; text-underline-offset: 3px; }
  .skip-link a:hover { color: var(--sw-text-bright); }

  /* doc-links — small reference list inside cards */
  .doc-links {
    margin-top: 22px;
    font-size: 12.5px;
    color: var(--sw-text);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    align-items: center;
    line-height: 1.5;
  }
  .doc-links .doc-label {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--sw-text-dim);
  }
  .doc-links a {
    color: var(--sw-text-bright);
    text-decoration: none;
    border-bottom: 1px dotted rgba(125,168,252,0.45);
    padding-bottom: 1px;
    white-space: nowrap;
  }
  .doc-links a:hover {
    color: var(--sw-blue);
    border-bottom-color: var(--sw-blue);
    text-decoration: none;
  }
  .doc-links a::after {
    content: " ↗";
    font-size: 10px;
    opacity: 0.5;
    margin-left: 2px;
  }

  /* try-saying — speakable prompt chips */
  .try-saying { margin-top: 22px; }
  .try-label {
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sw-text-dim); font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .try-label::before {
    content: '🎙'; font-size: 12px;
  }
  .try-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .try-chip {
    font-size: 13px; padding: 7px 14px; border-radius: 999px;
    background: rgba(247,42,114,0.08);
    border: 1px solid rgba(247,42,114,0.28);
    color: var(--sw-text-bright);
    line-height: 1.3;
  }

  /* ============ LOCKED PREVIEW (agent timeline) ============ */
  .preview-section {
    padding: 64px 24px 40px;
    border-top: 1px solid var(--sw-border);
    background:
      radial-gradient(ellipse 60% 80% at 50% 0%, rgba(247,42,114,0.05) 0%, transparent 50%),
      var(--sw-dark);
  }
  .preview-inner { max-width: 1080px; margin: 0 auto; }
  .preview-head {
    text-align: center; margin-bottom: 36px;
  }
  .preview-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--sw-text-dim); font-weight: 700; margin-bottom: 10px;
  }
  .preview-eyebrow::before { content: '🔒'; font-size: 12px; }
  .preview-head h2 {
    font-size: 26px; color: var(--sw-text-bright); font-weight: 700;
    letter-spacing: -0.01em;
  }
  .preview-head p {
    margin-top: 8px; font-size: 14.5px; color: var(--sw-text-dim);
    max-width: 580px; margin-left: auto; margin-right: auto;
  }

  .preview-timeline {
    display: flex; align-items: center; gap: 0;
    max-width: 880px; margin: 0 auto;
    padding: 16px 0;
    opacity: 0.55;
    filter: saturate(0.6);
  }
  .preview-node {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .preview-node-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--sw-card); border: 2px solid var(--sw-border);
    display: flex; align-items: center; justify-content: center;
    color: var(--sw-text-dim); font-weight: 700; font-size: 13px;
  }
  .preview-node-label { font-size: 10.5px; color: var(--sw-text-dim); }
  .preview-connector {
    flex: 1; height: 2px; background: var(--sw-border); margin: 0 -2px; align-self: flex-start; margin-top: 18px;
  }

  .preview-blurb {
    margin: 28px auto 0; text-align: center; max-width: 580px;
    font-size: 13.5px; color: var(--sw-text-dim); font-style: italic;
  }

  /* ============ AFTER THE BASICS (pillars) ============ */
  .pillars-section { padding: 64px 24px; max-width: 1080px; margin: 0 auto; }
  .pillars-head {
    text-align: center; margin-bottom: 36px;
  }
  .pillars-head .label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--sw-text-dim); font-weight: 700;
  }
  .pillars-head h2 {
    font-size: 28px; color: var(--sw-text-bright); margin-top: 6px;
    letter-spacing: -0.01em; font-weight: 700;
  }
  .pillars-head p { color: var(--sw-text); margin-top: 8px; max-width: 560px; margin-left: auto; margin-right: auto; font-size: 14.5px; }

  .pillars-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .pillar-card {
    background: var(--sw-card); border: 1px solid var(--sw-border);
    border-radius: 16px; padding: 28px;
    opacity: 0.7; filter: saturate(0.85);
    transition: opacity 0.2s, filter 0.2s;
  }
  .pillar-card.locked {
    position: relative;
  }
  .pillar-card.locked::after {
    content: '🔒'; position: absolute; top: 18px; right: 22px; font-size: 16px; opacity: 0.5;
  }
  .pillar-eyebrow {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 8px;
  }
  .pillar-card.rest .pillar-eyebrow { color: var(--sw-orange); }
  .pillar-card.relay .pillar-eyebrow { color: var(--sw-cyan); }
  .pillar-name { font-size: 18px; color: var(--sw-text-bright); font-weight: 600; margin-bottom: 8px; }
  .pillar-desc { font-size: 13.5px; color: var(--sw-text); }

  .footer {
    text-align: center; padding: 32px 24px; font-size: 13px;
    color: var(--sw-text-dim); border-top: 1px solid var(--sw-border);
  }

  /* ===== Workshop state ===== */
  .status-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3);
    color: var(--sw-cyan); padding: 6px 14px; border-radius: 999px;
    font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em;
  }
  .status-pill .sep { color: rgba(56,189,248,0.4); }
  .status-pill a { color: var(--sw-cyan); text-decoration: underline; text-underline-offset: 3px; }
  .status-pill a:hover { color: var(--sw-text-bright); }

  .workshop-hero { text-align: center; }
  .workshop-hero h1 {
    font-size: 32px; line-height: 1.15; font-weight: 700;
    color: var(--sw-text-bright); letter-spacing: -0.015em;
    margin-top: 18px;
  }
  .workshop-hero .pinned-url {
    margin: 28px auto 0; max-width: 760px;
  }
  .workshop-hero .helper {
    margin: 16px auto 0; max-width: 640px; font-size: 14px; color: var(--sw-text-dim);
  }

  /* Timeline (interactive) */
  .timeline {
    display: flex; align-items: center; gap: 0;
    max-width: 880px; margin: 0 auto; padding: 16px 0;
  }
  .timeline-node {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; background: transparent; border: none; padding: 0;
  }
  .timeline-node:focus-visible .timeline-circle {
    outline: 2px solid var(--sw-blue); outline-offset: 4px;
  }
  .timeline-circle {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--sw-card); border: 2px solid var(--sw-border);
    display: flex; align-items: center; justify-content: center;
    color: var(--sw-text-dim); font-weight: 700; font-size: 13px;
    transition: all 0.2s;
  }
  .timeline-node.visited .timeline-circle {
    background: rgba(56,189,248,0.15); border-color: var(--sw-cyan); color: var(--sw-cyan);
  }
  .timeline-node.active .timeline-circle {
    background: linear-gradient(135deg, var(--sw-blue), var(--sw-magenta));
    border-color: var(--sw-magenta); color: white; transform: scale(1.25);
    box-shadow: 0 0 0 5px rgba(247,42,114,0.18), 0 0 24px rgba(247,42,114,0.45);
  }
  .timeline-label { font-size: 11px; color: var(--sw-text-dim); }
  .timeline-node.visited .timeline-label { color: var(--sw-text); }
  .timeline-node.active .timeline-label { color: var(--sw-text-bright); font-weight: 600; }
  .timeline-connector { flex: 1; height: 2px; background: var(--sw-border); margin: 0 -2px; align-self: flex-start; margin-top: 20px; }
  .timeline-connector.visited { background: var(--sw-cyan); }

  /* Active step detail */
  .active-detail {
    background: var(--sw-card); border: 1px solid var(--sw-border);
    border-radius: 16px; padding: 32px;
    max-width: 900px; margin: 40px auto 0;
    box-shadow: 0 24px 60px -20px rgba(247,42,114,0.15);
  }
  .active-detail .eyebrow {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sw-magenta); font-weight: 700;
  }
  .active-detail h2 { font-size: 26px; color: var(--sw-text-bright); margin-top: 6px; }
  .active-detail .desc { font-size: 15px; color: var(--sw-text); margin-top: 8px; }
  .detail-grid {
    margin-top: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .detail-tile {
    background: var(--sw-dark); border: 1px solid var(--sw-border);
    border-radius: 10px; padding: 14px 16px;
  }
  .detail-tile .label {
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sw-text-dim); font-weight: 700; margin-bottom: 8px;
  }
  .detail-tile .value { font-size: 13.5px; color: var(--sw-text-bright); }
  .pill { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 10px;
    background: rgba(255,255,255,0.06); color: var(--sw-text); margin: 0 4px 4px 0; }
  .pill.new { background: rgba(247,42,114,0.15); color: var(--sw-magenta); }
  .source-row { margin-top: 22px; display: flex; gap: 10px; flex-wrap: wrap; }
  .src-btn {
    font-size: 12.5px; padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--sw-border); color: var(--sw-text-bright);
    background: transparent; text-decoration: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .src-btn:hover { border-color: var(--sw-blue); }
  .src-btn.primary { background: var(--sw-blue); border-color: var(--sw-blue); }

  /* agent URL bubble + next/prev navigation inside active-detail */
  .agent-nav {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--sw-border);
  }
  .agent-nav .btn-primary { display: inline-flex; align-items: center; gap: 8px; }
  .agent-nav-done { font-size: 13px; color: var(--sw-text-dim); margin-left: auto; text-align: right; }

  @media (max-width: 768px) {
    .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .topbar nav a { margin-left: 12px; font-size: 12px; }
    .hero { padding: 88px 16px 40px; }
    .hero h1 { font-size: 30px; }
    .hero-sub { font-size: 15px; }

    .milestones { flex-direction: column; align-items: stretch; gap: 14px; }
    .milestone { flex-direction: row; align-items: center; gap: 14px; }
    .milestone-label { font-size: 13px; }
    .milestone-connector { display: none; }

    .wizard-card { padding: 22px 18px; }
    .wizard-card h2 { font-size: 22px; }
    .url-card { flex-direction: column; align-items: stretch; }
    .url-card .btn-copy { width: 100%; }
    .dashboard-hint { flex-direction: column; }
    .wizard-nav { flex-direction: column; gap: 12px; align-items: stretch; }
    .wizard-nav .step-counter { text-align: center; order: -1; }
    .agent-nav { flex-direction: column; align-items: stretch; gap: 10px; }
    .agent-nav-done { text-align: center; margin-left: 0; }

    .timeline, .preview-timeline { flex-wrap: wrap; gap: 14px; justify-content: center; }
    .timeline-connector, .preview-connector { display: none; }

    .detail-grid, .pillars-grid { grid-template-columns: 1fr; }

    .workshop-hero h1 { font-size: 26px; }
    .active-detail { padding: 22px; }
    .active-detail h2 { font-size: 22px; }
  }

  a:focus-visible, button:focus-visible, .timeline-node:focus-visible, .milestone:focus-visible {
    outline: 2px solid var(--sw-blue); outline-offset: 3px; border-radius: 4px;
  }

  /* Link-styled button for actions that look like links (Reset workshop progress) */
  .link-button {
    background: none; border: none; padding: 0; margin: 0;
    color: var(--sw-blue); text-decoration: none;
    font: inherit; cursor: pointer;
  }
  .link-button:hover { text-decoration: underline; }
</style>
</head>

function renderDocLinks(docs, label = "Read more") {
  if (!docs || !docs.length) return "";
  const items = docs.map(d =>
    `<a href="${DOCS_BASE}${d.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(d.label)}</a>`
  ).join("");
  return `<div class="doc-links"><span class="doc-label">${escapeHtml(label)}</span>${items}</div>`;
}

function renderTrySaying(prompts) {

/* ---- Auth + URL composition (unchanged behavior) ---- */
let authUser = "workshop";
let authPass = "password";

async function loadConfig() {
  try {
    const resp = await fetch("/config");
    if (resp.ok) {
      const cfg = await resp.json();
      if (cfg.auth_user) authUser = cfg.auth_user;
      if (cfg.auth_pass) authPass = cfg.auth_pass;
    }
  } catch (e) { /* keep defaults */ }
  renderAll();
}

function getBaseUrl() { return window.location.origin; }

function getSwmlUrl(route) {
  const base = getBaseUrl();
  try {
    const url = new URL(base);
    return `${url.protocol}//${authUser}:${authPass}@${url.host}${route}`;
  } catch {
    return `${base}${route}`;
  }
}

function copyUrl(btn, text) {
  const original = btn.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = original; btn.classList.remove("copied"); }, 2000);
  }).catch(() => {
    btn.textContent = "Copy failed";
    setTimeout(() => { btn.textContent = original; }, 2000);
  });
}

/* ---- Persistent state ---- */
const state = {
  onboardingComplete: localStorage.getItem("chicago2026.onboardingComplete") === "1",
  milestone: Math.min(4, Math.max(1, parseInt(localStorage.getItem("chicago2026.milestone") || "1", 10) || 1)),
  visited: JSON.parse(localStorage.getItem("chicago2026.visited") || "[]"),
  activeStep: localStorage.getItem("chicago2026.activeStep") || "/step04",
};

function persist() {
  localStorage.setItem("chicago2026.onboardingComplete", state.onboardingComplete ? "1" : "0");
  localStorage.setItem("chicago2026.milestone", String(state.milestone));
  localStorage.setItem("chicago2026.visited", JSON.stringify(state.visited));
  localStorage.setItem("chicago2026.activeStep", state.activeStep);
}

function resetState() {
  localStorage.removeItem("chicago2026.onboardingComplete");
  localStorage.removeItem("chicago2026.milestone");
  localStorage.removeItem("chicago2026.visited");
  localStorage.removeItem("chicago2026.activeStep");
  location.reload();
}

function renderMilestones() {
  const m = state.milestone;
  let html = `<div class="milestones">`;
  MILESTONES.forEach((mi, i) => {
    const cls = mi.key < m ? "done" : mi.key === m ? "active" : "";
    const inner = mi.key < m ? "✓" : String(mi.key);
    html += `
      <div class="milestone ${cls}" ${cls === 'active' ? 'aria-current="step"' : ''} aria-label="Milestone ${mi.key}: ${mi.label}, ${cls || 'upcoming'}">
        <div class="milestone-dot">${inner}</div>
        <div class="milestone-label">${mi.label}</div>
      </div>`;
    if (i < MILESTONES.length - 1) {
      const conn = mi.key < m ? "done" : "";
      html += `<div class="milestone-connector ${conn}"></div>`;
    }
  });
  html += `</div>`;
  return html;
}

}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

function attachWizardHandlers() {
  const m = state.milestone;
  const on = (id, ev, fn) => document.getElementById(id)?.addEventListener(ev, fn);
  if (m === 1) {
    on("ms1-yes", "click", () => advanceMilestone());
  } else if (m === 2) {
    on("ms2-back", "click", () => backMilestone());
    on("ms2-next", "click", () => advanceMilestone());
    on("ms2-copy", "click", e => copyUrl(e.currentTarget, getSwmlUrl("/step04")));
  } else if (m === 3) {
    on("ms3-back", "click", () => backMilestone());
    on("ms3-next", "click", () => advanceMilestone());
  } else if (m === 4) {
    on("ms4-back", "click", () => backMilestone());
    on("ms4-done", "click", () => completeOnboarding());
  }
}

function advanceMilestone() {
  if (state.milestone < 4) {
    state.milestone += 1;
    persist();
    renderAll();
  } else {
    completeOnboarding();
  }
}

function backMilestone() {
  if (state.milestone > 1) {
    state.milestone -= 1;
    persist();
    renderAll();
  }
}

function completeOnboarding() {
  state.onboardingComplete = true;
  if (!state.visited.includes("/step04")) state.visited.push("/step04");
  state.activeStep = "/step04";
  persist();
  renderAll();
}

        <div class="label">After the basics</div>
        <h2>Two more pillars beyond the AI agent</h2>
        <p>SignalWire is more than AI voice. Both pillars run from your browser without picking up the phone.</p>
      </div>
      <div class="pillars-grid" id="pillars-host">
        ${PILLAR_CARDS.map(p => {
          const accent = p.pillar;
          const namePart = p.name.includes(" - ") ? p.name.split(" - ").slice(1).join(" - ") : p.name;
          return `
          <div class="pillar-card ${accent}">
            <div class="pillar-eyebrow">${escapeHtml(p.step.toUpperCase())} · ${escapeHtml(p.name.split(" - ")[0])}</div>
            <div class="pillar-name">${escapeHtml(namePart)}</div>
            <div class="pillar-desc">${escapeHtml(p.desc)}</div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
              <button class="src-btn primary" data-run="${p.pillar}">▶ ${escapeHtml(p.runLabel)}</button>
              <a href="${pySourceUrl(p.stem)}" target="_blank" rel="noopener noreferrer" class="src-btn">Python source</a>
              <a href="${tsSourceUrl(p.stem)}" target="_blank" rel="noopener noreferrer" class="src-btn">TypeScript source</a>
            </div>
            ${renderDocLinks(p.docs, "Docs")}
            <div class="run-inputs" data-pillar="${p.pillar}" hidden style="margin-top:12px;"></div>
            <pre class="run-log" data-pillar="${p.pillar}" style="margin-top:12px;background:var(--sw-dark);border:1px solid var(--sw-border);border-radius:8px;padding:12px;font-size:12px;color:var(--sw-text);min-height:0;max-height:280px;overflow:auto;font-family:'SF Mono',monospace;"></pre>
          </div>`;
        }).join("")}
      </div>
    </section>

    <div class="footer">
      Built with the <a href="https://signalwire.com/docs/server-sdks" target="_blank" rel="noopener noreferrer">SignalWire Agents SDK</a>
      · <a href="https://github.com/jongray00/Chicago-Roadshow-2026" target="_blank" rel="noopener noreferrer">github.com/jongray00/Chicago-Roadshow-2026</a>
      · <button type="button" class="link-button" id="reset-progress-link">Reset workshop progress</button>
    </div>
  `;

  document.getElementById("restart-wizard-link")?.addEventListener("click", e => {
    e.preventDefault();
    state.onboardingComplete = false;
    state.milestone = 1;
    persist();
    renderAll();
  });
  document.getElementById("reset-progress-link")?.addEventListener("click", e => {
    e.preventDefault();
    resetState();
  });
  document.querySelectorAll(".timeline-node").forEach(node => {
    node.addEventListener("click", () => setActiveStep(node.dataset.route));
  });
  document.getElementById("pinned-copy")?.addEventListener("click", e => copyUrl(e.currentTarget, getSwmlUrl(state.activeStep)));
  document.getElementById("detail-url-copy")?.addEventListener("click", e => copyUrl(e.currentTarget, getSwmlUrl(state.activeStep)));
  document.getElementById("detail-prev")?.addEventListener("click", e => setActiveStep(e.currentTarget.dataset.route));
  document.getElementById("detail-next")?.addEventListener("click", e => setActiveStep(e.currentTarget.dataset.route));
  document.querySelectorAll("[data-run]").forEach(btn => {
    btn.addEventListener("click", () => runPillar(btn.dataset.run));
  });
}

function renderPinnedUrlCard() {
  const step = STEPS_META.find(s => s.route === state.activeStep) || STEPS_META[0];
  const swmlUrl = getSwmlUrl(step.route);
  return `
    <div class="url-card">
      <div class="url-meta">
        <div class="url-label" style="color:var(--sw-text-bright);">${escapeHtml(step.step)} · ${escapeHtml(step.name)} · selected</div>
        <div class="url-text">${escapeHtml(swmlUrl)}</div>
      </div>
      <button class="btn-copy" id="pinned-copy">Copy URL</button>
    </div>`;
}

function renderTimeline() {
  let html = `<div class="timeline">`;
  STEPS_META.forEach((s, i) => {
    if (i > 0) {
      const prev = STEPS_META[i - 1];
      const conn = (state.visited.includes(prev.route) && state.visited.includes(s.route)) ? "visited" : "";
      html += `<div class="timeline-connector ${conn}"></div>`;
    }
    const cls = [
      state.visited.includes(s.route) ? "visited" : "",
      s.route === state.activeStep ? "active" : "",
    ].filter(Boolean).join(" ");
    const stateWord =
      s.route === state.activeStep ? "active" :
      state.visited.includes(s.route) ? "visited" : "upcoming";
    const num = s.step.replace(/[^0-9]/g, "");
    const ariaCurrent = s.route === state.activeStep ? ' aria-current="step"' : '';
    html += `
      <button class="timeline-node ${cls}" data-route="${s.route}"${ariaCurrent}
              aria-label="${escapeHtml(s.step)}: ${escapeHtml(s.name)}, ${stateWord}">
        <div class="timeline-circle">${num}</div>
        <div class="timeline-label">${escapeHtml(s.name.split(" ")[0])}</div>
      </button>`;
  });
  html += `</div>`;
  return html;
}

function renderActiveDetail() {
  const idx = STEPS_META.findIndex(s => s.route === state.activeStep);
  const i = idx >= 0 ? idx : 0;
  const step = STEPS_META[i];
  const prev = i > 0 ? STEPS_META[i - 1] : null;
  const next = i < STEPS_META.length - 1 ? STEPS_META[i + 1] : null;
  const swmlUrl = getSwmlUrl(step.route);
  const caps = step.capabilities.map(c => {
    const isNew = step.newCapabilities.includes(c);
    return `<span class="pill${isNew ? ' new' : ''}">${escapeHtml(c)}</span>`;
  }).join("");
  return `
    <div class="active-detail">
      <div class="eyebrow">Now active · ${escapeHtml(step.step)}</div>
      <h2>${escapeHtml(step.name)}</h2>
      <p class="desc">${escapeHtml(step.desc)}</p>
      ${renderTrySaying(step.prompts)}
      <div class="detail-grid">
        <div class="detail-tile">
          <div class="label">What's new in this step</div>
          <div class="value">${escapeHtml(step.whatsNew)}</div>
        </div>
        <div class="detail-tile">
          <div class="label">Capabilities so far</div>
          <div class="value">${caps}</div>
        </div>
      </div>
      ${renderDocLinks(step.docs, "Docs")}
      <div class="source-row">
        <a href="${pySourceUrl(step.stem)}" target="_blank" rel="noopener noreferrer" class="src-btn">View Python source</a>
        <a href="${tsSourceUrl(step.stem)}" target="_blank" rel="noopener noreferrer" class="src-btn">View TypeScript source</a>
      </div>
      <div class="url-card">
        <div class="url-meta">
          <div class="url-label">${escapeHtml(step.step)} · ${escapeHtml(step.name)} · SWML URL</div>
          <div class="url-text">${escapeHtml(swmlUrl)}</div>
        </div>
        <button class="btn-copy" id="detail-url-copy">Copy URL</button>
      </div>
      <div class="agent-nav">
        ${prev
          ? `<button class="btn-secondary" id="detail-prev" data-route="${prev.route}">← ${escapeHtml(prev.name)}</button>`
          : `<span></span>`}
        ${next
          ? `<button class="btn-primary" id="detail-next" data-route="${next.route}">Next agent: ${escapeHtml(next.name)} →</button>`
          : `<span class="agent-nav-done">Final agent — explore the REST &amp; RELAY pillars below ↓</span>`}
      </div>
    </div>`;
}

function setActiveStep(route) {
  activePillarStreams.forEach(es => es.close());
  activePillarStreams.clear();
  state.activeStep = route;
  if (!state.visited.includes(route)) state.visited.push(route);
  persist();
  renderAll();
}

/* ---- Render dispatcher ---- */
function renderAll() {
  if (state.onboardingComplete) {
    renderWorkshop();
  } else {
    renderOnboarding();
  }
}

const activePillarStreams = new Map();
async function runPillar(pillar) {
  const logPane = document.querySelector(`.run-log[data-pillar="${pillar}"]`);
  const inputsPane = document.querySelector(`.run-inputs[data-pillar="${pillar}"]`);
  if (!logPane || !inputsPane) return;
  activePillarStreams.get(pillar)?.close();
  logPane.textContent = "";

  const inputsResp = await fetch(`/run/${pillar}/inputs`);
  const inputsInfo = await inputsResp.json();

  let inputs = {};
  if (inputsInfo.missing && inputsInfo.missing.length > 0) {
    inputsPane.hidden = false;
    inputsPane.innerHTML = inputsInfo.missing.map(k =>
      `<label style="display:inline-flex;flex-direction:column;font-size:11px;color:var(--sw-text-dim);margin-right:10px;">
         ${escapeHtml(k)}
         <input name="${escapeHtml(k)}" style="background:var(--sw-dark);border:1px solid var(--sw-border);color:var(--sw-text-bright);padding:6px 10px;border-radius:5px;font-size:13px;margin-top:3px;min-width:180px;" />
       </label>`
    ).join("") + ` <button class="src-btn primary submit-inputs" style="margin-left:8px;">Run</button>`;
    await new Promise(resolve => {
      inputsPane.querySelector(".submit-inputs").addEventListener("click", () => {
        inputs = Object.fromEntries(
          [...inputsPane.querySelectorAll("input")].map(i => [i.name, i.value])
        );
        inputsPane.hidden = true;
        resolve();
      }, { once: true });
    });
  }

  const startResp = await fetch(`/run/${pillar}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ inputs }),
  });
  const { run_id } = await startResp.json();

  const es = new EventSource(`/run/${pillar}/stream/${run_id}`);
  activePillarStreams.set(pillar, es);
  function append(line, isErr) {
    const span = document.createElement("span");
    span.textContent = line + "\n";
    if (isErr) span.style.color = "var(--sw-magenta)";
    logPane.appendChild(span);
    logPane.scrollTop = logPane.scrollHeight;
  }
  es.addEventListener("stdout", e => append(JSON.parse(e.data).data, false));
  es.addEventListener("stderr", e => append(JSON.parse(e.data).data, true));
  function closeStream() {
    es.close();
    if (activePillarStreams.get(pillar) === es) activePillarStreams.delete(pillar);
  }
  es.addEventListener("exit", e => {
    const payload = JSON.parse(e.data);
    append(`[exit code ${payload.data}]`, payload.data !== "0");
    closeStream();
  });
  es.addEventListener("end", closeStream);
  es.addEventListener("cancelled", () => {
    append("[run cancelled by newer click]", true);
    closeStream();
  });
}

loadConfig();
</script>
</body>
</html>
